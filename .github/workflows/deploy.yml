name: Build and Deploy to CloudHub 2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: |
            [
              {
                "id": "anypoint-exchange-v3",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              }
            ]

      - name: Build
        run: mvn clean package -DskipTests -DskipRuntimeValidation=true

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: mule-app
          path: target/*.jar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: mule-app

      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4

      - name: Deploy to CloudHub 2
        run: |
          anypoint-cli-v4 runtime-mgr cloudhub2-application deploy \
            --client_id "${{ secrets.ANYPOINT_CLIENT_ID }}" \
            --client_secret "${{ secrets.ANYPOINT_CLIENT_SECRET }}" \
            --organization "${{ secrets.ANYPOINT_ORG_ID }}" \
            --environment "${{ vars.DEPLOY_ENV }}" \
            --target "${{ vars.DEPLOY_TARGET }}" \
            --runtime-version "4.11.2" \
            --replicas 1 \
            --vcores "0.1" \
            "${{ vars.APP_NAME }}" \
            *.jar
