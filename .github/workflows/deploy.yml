name: Build and Deploy to CloudHub 2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: |
            [
              {
                "id": "anypoint-exchange-v3",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "mulesoft-releases",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "mulesoft-enterprise",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              }
            ]
          repositories: |
            [
              {
                "id": "anypoint-exchange-v3",
                "name": "Anypoint Exchange",
                "url": "https://maven.anypoint.mulesoft.com/api/v3/maven",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "false" }
              },
              {
                "id": "mulesoft-releases",
                "name": "MuleSoft Releases",
                "url": "https://repository.mulesoft.org/releases/",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "false" }
              }
            ]
          plugin_repositories: |
            [
              {
                "id": "mulesoft-releases",
                "name": "MuleSoft Releases",
                "url": "https://repository.mulesoft.org/releases/",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "false" }
              }
            ]

      - name: Build
        run: mvn clean package -DskipTests -DskipValidation=true

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: mule-app
          path: target/*.jar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: mule-app

      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4

      - name: Authenticate Anypoint CLI
        run: |
          anypoint-cli-v4 conf client_id "${{ secrets.ANYPOINT_CLIENT_ID }}"
          anypoint-cli-v4 conf client_secret "${{ secrets.ANYPOINT_CLIENT_SECRET }}"
          anypoint-cli-v4 conf organization "${{ secrets.ANYPOINT_ORG_ID }}"
          anypoint-cli-v4 conf environment "${{ vars.DEPLOY_ENV }}"

      - name: Upload to Exchange
        run: |
          JAR_FILE=$(ls *.jar | head -1)
          echo "Uploading: $JAR_FILE"
          anypoint-cli-v4 exchange asset upload \
            --name "${{ vars.APP_NAME }}" \
            --type app \
            --files "{\"mule-application.jar\": \"$JAR_FILE\"}" \
            "${{ secrets.ANYPOINT_ORG_ID }}/${{ vars.APP_NAME }}/1.0.0"

      - name: Deploy to CloudHub 2
        run: |
          anypoint-cli-v4 runtime-mgr application deploy \
            --replicaSize "0.1" \
            --publicEndpoints "${{ vars.PUBLIC_ENDPOINT }}" \
            "${{ vars.APP_NAME }}" \
            "${{ vars.DEPLOY_TARGET }}" \
            "${{ vars.RUNTIME_VERSION }}" \
            "${{ vars.APP_NAME }}"
